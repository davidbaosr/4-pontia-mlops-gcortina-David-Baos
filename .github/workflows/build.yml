name: Build Model

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: |
          mkdir -p data/raw
          curl -L -o data/raw/data.csv https://raw.githubusercontent.com/jbrownlee/Datasets/master/pima-indians-diabetes.data.csv

      - name: Train and save model
        run: |
          python src/main.py

      - name: Run model tests
        run: |
          pytest model_tests/

      - name: Upload model to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: models/model.pkl
          tag_name: model-${{ github.run_number }}
          body: "Model trained in run ${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}