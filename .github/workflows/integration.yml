name: Integration

on:
  pull_request:
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests and save exit code
        id: tests
        run: |
          mkdir -p test-results
          pytest model_tests/ --junitxml=test-results/results.xml > test-results/results.log 2>&1
        continue-on-error: true

      - name: Comment test results and coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('test-results/results.log', 'utf8');
            const truncated = results.length > 65000 ? results.slice(0, 65000) + '\n...TRUNCATED...' : results;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🧪 Test Results\n\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail the job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1